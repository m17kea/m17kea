name: Update Profile Cards

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/update-profile-cards.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRS_TOKEN: ${{ secrets.README_STATS_PAT != '' && secrets.README_STATS_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: profile/stats.svg
          options: username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&hide_border=true&include_all_commits=true
          token: ${{ env.GRS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          path: profile/top-langs.svg
          options: username=${{ github.repository_owner }}&layout=compact&theme=github_dark&hide_border=true
          token: ${{ env.GRS_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile stats cards" || exit 0
          git push
